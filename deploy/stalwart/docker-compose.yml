# Self-hosted mail server for Gutu — Stalwart + shared Postgres + MinIO.
#
# This compose file brings up a complete mail backend that the Gutu admin
# panel can talk to via JMAP. It is intentionally split into three services:
#
#   - stalwart : the MTA (SMTP in/out) + JMAP/IMAP server. Stateless container
#                — every byte of state lives in Postgres and MinIO.
#   - postgres : relational metadata (accounts, mailboxes, message index).
#                Re-use the Gutu Postgres if you already run one — see
#                README.md for that variant.
#   - minio    : S3-compatible blob storage for raw RFC822 message bodies +
#                attachments. Re-use AWS S3 / R2 / Backblaze in production.
#
# Defaults are tuned for a single-VPS install. Swap to AWS RDS + S3 for HA.
#
# Bring up:
#     docker compose -f deploy/stalwart/docker-compose.yml --env-file deploy/stalwart/.env up -d
#
# Default ports:
#     25  : SMTP (inbound, public)
#     465 : SMTPS (submission)
#     587 : SMTP submission (clients)
#     993 : IMAPS
#     8080: JMAP / Admin HTTP — front this with HTTPS via your reverse proxy
#
# Production checklist:
#     - Replace `STALWART_ADMIN_PASSWORD` with a strong value.
#     - Replace `MINIO_ROOT_PASSWORD` and `POSTGRES_PASSWORD`.
#     - Front 8080 with TLS (Caddy / Traefik / nginx). Do NOT expose plain
#       HTTP to the public internet.
#     - Pin `stalwartlabs/mail-server` to a versioned tag in production.
#     - Set up backups for the `stalwart-postgres` + `stalwart-minio` volumes.
#     - Configure DKIM keys via Stalwart's admin UI; publish the DNS records
#       generated by Gutu's "Mail → Self-hosted → DNS" page.

services:
  stalwart:
    image: stalwartlabs/mail-server:latest
    container_name: stalwart
    restart: unless-stopped
    ports:
      - "25:25"     # SMTP inbound — open to the public internet
      - "465:465"   # SMTPS submission
      - "587:587"   # SMTP submission (STARTTLS)
      - "993:993"   # IMAPS
      - "8080:8080" # JMAP / management HTTP — front with HTTPS in prod
    environment:
      # The fallback admin password — Stalwart hashes and stores this on
      # first boot, after which it's read from the database. Rotating
      # afterwards is done through the admin UI, not this env var.
      - STALWART_ADMIN_PASSWORD=${STALWART_ADMIN_PASSWORD:-please-change-me}
    volumes:
      - ./config.toml:/opt/stalwart/etc/config.toml:ro
      - stalwart-data:/opt/stalwart/data
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: stalwart-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=stalwart
      - POSTGRES_USER=stalwart
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-stalwart-pg-password}
    volumes:
      - stalwart-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stalwart -d stalwart"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: stalwart-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-stalwart}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-stalwart-minio-password}
    volumes:
      - stalwart-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot job to create the `mail-blobs` bucket on first boot. Idempotent.
  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-stalwart}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-stalwart-minio-password}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/mail-blobs;
      /usr/bin/mc anonymous set none local/mail-blobs;
      echo 'minio bootstrap complete';
      "

volumes:
  stalwart-data:
  stalwart-postgres:
  stalwart-minio:
